<!doctype html>

  <style>
    :root {

    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F9FAFB; color: #111827; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header { position: sticky; top: 0; z-index: 10; background: var(--ink); color: #fff; padding: 14px 24px; display: flex; gap: 16px; align-items: baseline; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    header h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
    header .tag { font-size: 12px; color: #99F6E4; }
    header .count { margin-left: auto; font-size: 12px; color: #CCFBF1; }
    main { max-width: 1440px; margin: 0 auto; padding: 0; background: #fff; box-shadow: 0 0 0 1px #E5E7EB; }
    figure { margin: 0; display: block; }
    figure img { display: block; width: 100%; height: auto; }
    figcaption { padding: 8px 16px; background: var(--teal-50); color: var(--ink); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-top: 1px solid #CCFBF1; border-bottom: 1px solid #CCFBF1; }
    figcaption .idx { color: var(--teal); margin-right: 8px; font-weight: 800; }
    .hint { max-width: 1440px; margin: 0 auto; padding: 12px 16px; color: var(--muted); font-size: 12px; background: #fff; border-top: 1px solid #E5E7EB; }
  </style>
</head>
