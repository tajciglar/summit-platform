<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit Platform - Database Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }

  #canvas { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; }
  #canvas.dragging { cursor: grabbing; }
  #world { position: absolute; transform-origin: 0 0; }

  .table-card {
    position: absolute;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    min-width: 220px;
    max-width: 280px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    cursor: move;
    user-select: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .table-card:hover { box-shadow: 0 8px 32px rgba(99,102,241,0.3); border-color: #6366f1; }
  .table-card.highlight { border-color: #f59e0b; box-shadow: 0 8px 32px rgba(245,158,11,0.4); }

  .table-header {
    padding: 8px 12px;
    font-weight: 700;
    font-size: 13px;
    border-bottom: 1px solid #334155;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .table-cols {
    padding: 6px 0;
    max-height: 260px;
    overflow-y: auto;
    font-size: 11px;
  }
  .table-cols::-webkit-scrollbar { width: 4px; }
  .table-cols::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

  .col-row {
    padding: 2px 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .col-row:hover { background: #334155; }
  .col-name { color: #e2e8f0; font-weight: 500; }
  .col-name.pk { color: #fbbf24; }
  .col-name.fk { color: #38bdf8; }
  .col-type { color: #64748b; font-size: 10px; white-space: nowrap; }

  .legend {
    position: fixed; bottom: 16px; left: 16px; background: #1e293b; border: 1px solid #334155;
    border-radius: 8px; padding: 12px 16px; font-size: 11px; z-index: 100;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  .controls {
    position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 100;
  }
  .controls button {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .controls button:hover { background: #334155; }

  .title-bar {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    font-size: 18px; font-weight: 700; color: #f1f5f9;
  }
  .title-bar small { font-size: 12px; color: #64748b; font-weight: 400; display: block; margin-top: 2px; }

  .group-core .table-header { background: #312e81; color: #a5b4fc; }
  .group-funnel .table-header { background: #7c2d12; color: #fed7aa; }
  .group-sales .table-header { background: #14532d; color: #bbf7d0; }
  .group-content .table-header { background: #581c87; color: #e9d5ff; }
  .group-analytics .table-header { background: #0c4a6e; color: #bae6fd; }
  .group-auth .table-header { background: #44403c; color: #d6d3d1; }
  .group-system .table-header { background: #1e293b; color: #94a3b8; }
  .group-crm .table-header { background: #831843; color: #fbcfe8; }
  .group-media .table-header { background: #365314; color: #d9f99d; }
  .group-ai .table-header { background: #4a1d96; color: #c4b5fd; }
</style>
</head>
<body>
<div class="title-bar">
  Summit Platform DB
  <small id="table-count"></small>
</div>
<div class="controls">

  card.dataset.table = name;
  card.dataset.group = info.group;
  var pos = layout[name] || [100 + Math.random()*1200, 100 + Math.random()*800];
  card.style.left = pos[0] + 'px';
  card.style.top = pos[1] + 'px';

  var header = document.createElement('div');
  header.className = 'table-header';
  header.appendChild(document.createTextNode((groupIcons[info.group] || '') + ' ' + name));
  card.appendChild(header);

  var colsDiv = document.createElement('div');
  colsDiv.className = 'table-cols';
  for (var ci = 0; ci < info.cols.length; ci++) {
    var c = info.cols[ci];
    var row = document.createElement('div');
    row.className = 'col-row';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'col-name' + (c[2] ? ' ' + c[2] : '');
    nameSpan.textContent = (c[2] === 'pk' ? '\u{1F511} ' : '') + (c[2] === 'fk' ? '\u{1F517} ' : '') + c[0];
    var typeSpan = document.createElement('span');
    typeSpan.className = 'col-type';
    typeSpan.textContent = c[1];
    row.appendChild(nameSpan);
    row.appendChild(typeSpan);
    colsDiv.appendChild(row);
  }
  card.appendChild(colsDiv);

  (function(n) {
    card.addEventListener('mousedown', startDragHandler);
    card.addEventListener('mouseenter', function() { highlightRelated(n); });
    card.addEventListener('mouseleave', clearHighlights);
  })(name);

  world.appendChild(card);
  tableEls[name] = card;
}

document.getElementById('table-count').textContent = tableCount + ' tables';

function startDragHandler(e) {
  if (e.target.closest('.table-cols')) return;
  e.stopPropagation();
  dragEl = e.currentTarget;
  var rect = dragEl.getBoundingClientRect();
  dragOffX = (e.clientX - rect.left) / scale;
  dragOffY = (e.clientY - rect.top) / scale;
  dragEl.style.zIndex = 999;
}

document.addEventListener('mousemove', function(e) {
  if (dragEl) {
    var worldRect = world.getBoundingClientRect();
    var x = (e.clientX - worldRect.left) / scale - dragOffX;
    var y = (e.clientY - worldRect.top) / scale - dragOffY;
    dragEl.style.left = x + 'px';
    dragEl.style.top = y + 'px';
    drawLines();
  } else if (isPanning) {
    panX += e.clientX - startX;
    panY += e.clientY - startY;
    startX = e.clientX;
    startY = e.clientY;
    updateTransform();
  }
});

document.addEventListener('mouseup', function() {
  if (dragEl) { dragEl.style.zIndex = ''; dragEl = null; }
  isPanning = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('mousedown', function(e) {
  if (!e.target.closest('.table-card')) {
    isPanning = true;
    startX = e.clientX;
    startY = e.clientY;
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var delta = e.deltaY > 0 ? 0.92 : 1.08;
  var newScale = Math.min(2, Math.max(0.15, scale * delta));
  panX = e.clientX - (e.clientX - panX) * (newScale / scale);
  panY = e.clientY - (e.clientY - panY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, { passive: false });

function zoomIn() { scale = Math.min(2, scale * 1.2); updateTransform(); }
function zoomOut() { scale = Math.max(0.15, scale / 1.2); updateTransform(); }
function resetView() { scale = 0.55; panX = 40; panY = 40; updateTransform(); }

// Find the best edge + point to connect two cards
function getConnectPoint(fromEl, toEl) {
  var fl = parseFloat(fromEl.style.left), ft = parseFloat(fromEl.style.top);
  var fw = fromEl.offsetWidth, fh = fromEl.offsetHeight;
  var tl = parseFloat(toEl.style.left), tt = parseFloat(toEl.style.top);
  var tw = toEl.offsetWidth, th = toEl.offsetHeight;

  var fcx = fl + fw/2, fcy = ft + fh/2;
  var tcx = tl + tw/2, tcy = tt + th/2;

  // Determine which edges to connect from
  var dx = tcx - fcx, dy = tcy - fcy;
  var fromPt, toPt;

  if (Math.abs(dx) * 0.6 > Math.abs(dy)) {
    // Horizontal connection
    if (dx > 0) {
      fromPt = [fl + fw, fcy];
      toPt = [tl, tcy];
    } else {
      fromPt = [fl, fcy];
      toPt = [tl + tw, tcy];
    }
  } else {
    // Vertical connection
    if (dy > 0) {
      fromPt = [fcx, ft + fh];
      toPt = [tcx, tt];
    } else {
      fromPt = [fcx, ft];
      toPt = [tcx, tt + th];
    }
  }

  return { from: fromPt, to: toPt };
}

function drawLines() {
  while (linesSvg.firstChild) linesSvg.removeChild(linesSvg.firstChild);

  for (var i = 0; i < relationships.length; i++) {
    var rel = relationships[i];
    var elFrom = tableEls[rel[0]];
    var elTo = tableEls[rel[2]];
    if (!elFrom || !elTo) continue;

    var pts = getConnectPoint(elFrom, elTo);
    var x1 = pts.from[0], y1 = pts.from[1];
    var x2 = pts.to[0], y2 = pts.to[1];

    // Bezier control points for smooth curves
    var midX = (x1 + x2) / 2;
    var midY = (y1 + y2) / 2;
    var cdx = Math.abs(x2 - x1) * 0.4;
    var cdy = Math.abs(y2 - y1) * 0.4;

    var cx1, cy1, cx2, cy2;
    if (Math.abs(x2 - x1) > Math.abs(y2 - y1)) {
      // Horizontal-ish: control points push horizontally
      cx1 = x1 + (x2 > x1 ? cdx : -cdx);
      cy1 = y1;
      cx2 = x2 - (x2 > x1 ? cdx : -cdx);
      cy2 = y2;
    } else {
      // Vertical-ish: control points push vertically
      cx1 = x1;
      cy1 = y1 + (y2 > y1 ? cdy : -cdy);
      cx2 = x2;
      cy2 = y2 - (y2 > y1 ? cdy : -cdy);
    }

    var color = groupColors[elFrom.dataset.group] || '#475569';

    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + cx1 + ',' + cy1 + ' ' + cx2 + ',' + cy2 + ' ' + x2 + ',' + y2);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.4');
    path.dataset.from = rel[0];
    path.dataset.to = rel[2];
    linesSvg.appendChild(path);

    // Small dot at the FK end (many side)
    var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', x1);
    dot.setAttribute('cy', y1);
    dot.setAttribute('r', '3');
    dot.setAttribute('fill', color);
    dot.setAttribute('fill-opacity', '0.6');
    dot.dataset.from = rel[0];
    dot.dataset.to = rel[2];
    linesSvg.appendChild(dot);

    // Diamond at PK end (one side)
    var diamond = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    var dx2 = x2, dy2 = y2;
    diamond.setAttribute('points',
      (dx2) + ',' + (dy2 - 4) + ' ' +
      (dx2 + 4) + ',' + (dy2) + ' ' +
      (dx2) + ',' + (dy2 + 4) + ' ' +
      (dx2 - 4) + ',' + (dy2)
    );
    diamond.setAttribute('fill', color);
    diamond.setAttribute('fill-opacity', '0.6');
    diamond.dataset.from = rel[0];
    diamond.dataset.to = rel[2];
    linesSvg.appendChild(diamond);
  }
}

function highlightRelated(name) {
  var related = {};
  for (var i = 0; i < relationships.length; i++) {
    if (relationships[i][0] === name) related[relationships[i][2]] = true;
    if (relationships[i][2] === name) related[relationships[i][0]] = true;
  }
  for (var n in tableEls) {
    if (related[n]) tableEls[n].classList.add('highlight');
  }
  var paths = linesSvg.querySelectorAll('path, circle, polygon');
  for (var j = 0; j < paths.length; j++) {
    var el = paths[j];
    if (el.dataset.from === name || el.dataset.to === name) {
      if (el.tagName === 'path') {
        el.setAttribute('stroke-width', '3');
        el.setAttribute('stroke-opacity', '1');
      } else {
        el.setAttribute('fill-opacity', '1');
        if (el.tagName === 'circle') el.setAttribute('r', '5');
      }
    }
  }
}

function clearHighlights() {
  var cards = document.querySelectorAll('.table-card.highlight');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('highlight');
  var paths = linesSvg.querySelectorAll('path, circle, polygon');
  for (var j = 0; j < paths.length; j++) {
    var el = paths[j];
    if (el.tagName === 'path') {
      el.setAttribute('stroke-width', '1.5');
      el.setAttribute('stroke-opacity', '0.4');
    } else {
      el.setAttribute('fill-opacity', '0.6');
      if (el.tagName === 'circle') el.setAttribute('r', '3');
    }
  }
}

updateTransform();
requestAnimationFrame(drawLines);
</script>
</body>
</html>
